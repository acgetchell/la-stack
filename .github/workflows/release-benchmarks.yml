name: Release Benchmarks

# Archive full Criterion benchmark baselines for published releases.
# Release jobs publish durable artifacts, so they intentionally do not restore
# or save dependency caches.

permissions:
  contents: read

on:
  release:
    types:
      - published

concurrency:
  group: release-benchmarks-${{ github.event.release.tag_name }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  release-baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      release-asset: ${{ steps.package-baseline.outputs.asset }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.release.tag_name }}
          persist-credentials: false

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          cache: false

      - name: Install benchmark validation tools
        run: |
          set -euo pipefail

          just_version="$(grep '^just_version :=' justfile | cut -d '"' -f 2)"
          cargo install --locked just --version "$just_version"
          nextest_version="$(just --evaluate cargo_nextest_version)"
          cargo install --locked cargo-nextest --version "$nextest_version"

      - name: Validate benchmark inputs
        run: just test-bench-inputs

      - name: Save release Criterion baseline
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail

          cargo bench --locked --features bench --bench vs_linalg -- --save-baseline "$RELEASE_TAG"
          cargo bench --locked --features bench,exact --bench exact -- --save-baseline "$RELEASE_TAG"

      - name: Package release Criterion baseline
        id: package-baseline
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail

          asset="la-stack-${RELEASE_TAG}-criterion-baseline.tar.gz"
          tar -C target -czf "$asset" criterion
          echo "asset=$asset" >> "$GITHUB_OUTPUT"

      - name: Upload temporary baseline artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bench-baseline-${{ github.event.release.tag_name }}
          path: ${{ steps.package-baseline.outputs.asset }}
          retention-days: 30
          if-no-files-found: error

  publish-baseline:
    needs: release-baseline
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Download release baseline
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bench-baseline-${{ github.event.release.tag_name }}

      - name: Attach baseline to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_ASSET: ${{ needs.release-baseline.outputs.release-asset }}
        run: |
          set -euo pipefail

          gh release upload "$RELEASE_TAG" "$RELEASE_ASSET" --clobber

      - name: Release baseline summary
        env:
          RELEASE_ASSET: ${{ needs.release-baseline.outputs.release-asset }}
        run: |
          set -euo pipefail

          {
            echo "### Release Benchmark Baseline"
            echo ""
            echo "Uploaded release asset: \`$RELEASE_ASSET\`"
          } >> "$GITHUB_STEP_SUMMARY"
