[toolchain]
# Pin to MSRV as specified in Cargo.toml
channel = "1.96.0"

# Essential repository components. Keep checkout and CI setup lean; workflows
# install additional targets or components when they need them.
components = [
    "clippy", # Linting (you use strict pedantic mode)
    "rustfmt", # Code formatting (you use cargo fmt --all)
    "rust-src", # Source code for IDEs and local diagnostics
]

# Keep host installs small; CI passes matrix targets explicitly.
profile = "minimal"
